<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мир Драконов</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #55a630; /* Цвет травы */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Отключаем стандартные жесты браузера */
            -webkit-user-select: none; /* Запрет выделения на iOS */
            -webkit-touch-callout: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
        }

        /* Пользовательский интерфейс */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Чтобы клики проходили сквозь UI к канвасу */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            color: white;
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid #ffd700;
        }

        .stat-line {
            font-size: 20px;
            font-weight: bold;
            margin: 5px 0;
        }

        /* Полоса опыта */
        .xp-container {
            width: 50%;
            background: rgba(0,0,0,0.6);
            height: 24px;
            border-radius: 12px;
            border: 2px solid #fff;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .xp-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            transition: width 0.2s;
        }

        .xp-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 24px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Экраны меню и смерти */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 10px #ff8c00;
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff8c00, #ff0000);
            border: 3px solid #ffd700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        button:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

    <!-- Игровой холст -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Слой -->
    <div id="ui-layer">
        <div class="top-bar">
            <div class="stats-box">
                <div class="stat-line">❤️ Здоровье: <span id="hp-val">100</span> / <span id="maxhp-val">100</span></div>
                <div class="stat-line">💎 Камни: <span id="gems-val">0</span></div>
                <div class="stat-line">⭐ Уровень: <span id="level-val">1</span></div>
            </div>
            
            <div class="xp-container">
                <div class="xp-bar" id="xp-bar-fill"></div>
                <div class="xp-text" id="xp-text-val">Опыт: 0 / 10</div>
            </div>
        </div>
    </div>

    <!-- Главное меню -->
    <div id="start-screen" class="overlay-screen">
        <h1>🐉 Мир Драконов 🐉</h1>
        <p>Используйте два джойстика на экране для игры.<br>Левый джойстик (синий) — стрельба.<br>Правый джойстик (розовый) — движение.</p>
        <button id="btn-start">ИГРАТЬ</button>
    </div>

    <!-- Экран поражения -->
    <div id="game-over-screen" class="overlay-screen hidden">
        <h1>Вы пали в бою... 💀</h1>
        <p id="final-score">Вы собрали 0 камней и достигли 1 уровня.</p>
        <button id="btn-restart">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Элементы
        const hpVal = document.getElementById('hp-val');
        const maxhpVal = document.getElementById('maxhp-val');
        const gemsVal = document.getElementById('gems-val');
        const levelVal = document.getElementById('level-val');
        const xpBarFill = document.getElementById('xp-bar-fill');
        const xpTextVal = document.getElementById('xp-text-val');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreText = document.getElementById('final-score');

        // --- ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
        let gameLoopId;
        let isPlaying = false;
        let lastTime = 0;
        let leftJoy = null;
        let rightJoy = null;

        // Подгоняем канвас под размер окна
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (leftJoy && rightJoy) {
                leftJoy.updatePosition();
                rightJoy.updatePosition();
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Размер игрового мира (очень большой)
        const WORLD_SIZE = 4000; 

        // Декорации (Деревья, горы и т.д.)
        const scenery = [];
        const sceneryEmojis = ['🌲', '🌳', '🌸', '🍄', '⛰️', '🌿', '🪵'];

        // Игровые объекты
        let player;
        let enemies = [];
        let projectiles = [];
        let gems = [];
        let damageTexts = [];

        // Ввод пользователя
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        let mousePointer = { x: 0, y: 0, active: false }; // Для стрельбы с мыши на ПК

        // --- КЛАССЫ ---

        class Joystick {
            constructor(isLeft, baseColor, stickColor, baseBorder, stickBorder) {
                this.isLeft = isLeft;
                this.active = false;
                this.touchId = null;
                this.baseX = 0;
                this.baseY = 0;
                this.stickX = 0;
                this.stickY = 0;
                this.radius = 60;
                this.stickRadius = 30;
                this.baseColor = baseColor;
                this.stickColor = stickColor;
                this.baseBorder = baseBorder;
                this.stickBorder = stickBorder;
                this.dirX = 0;
                this.dirY = 0;
            }

            updatePosition() {
                const marginX = 100;
                const marginY = 100;
                this.baseY = canvas.height - marginY;
                this.baseX = this.isLeft ? marginX : canvas.width - marginX;
                if (!this.active) {
                    this.stickX = this.baseX;
                    this.stickY = this.baseY;
                }
            }

            start(touch) {
                this.active = true;
                this.touchId = touch.identifier;
                this.move(touch);
            }

            move(touch) {
                const dx = touch.clientX - this.baseX;
                const dy = touch.clientY - this.baseY;
                const dist = Math.hypot(dx, dy);
                
                if (dist > 0) {
                    this.dirX = dx / dist;
                    this.dirY = dy / dist;
                } else {
                    this.dirX = 0;
                    this.dirY = 0;
                }

                if (dist > this.radius) {
                    this.stickX = this.baseX + this.dirX * this.radius;
                    this.stickY = this.baseY + this.dirY * this.radius;
                } else {
                    this.stickX = touch.clientX;
                    this.stickY = touch.clientY;
                }
            }

            end() {
                this.active = false;
                this.touchId = null;
                this.stickX = this.baseX;
                this.stickY = this.baseY;
                this.dirX = 0;
                this.dirY = 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = 0.8;
                
                // Основание джойстика
                ctx.beginPath();
                ctx.arc(this.baseX, this.baseY, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.baseColor;
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = this.baseBorder;
                ctx.stroke();
                
                // Стик джойстика
                ctx.beginPath();
                ctx.arc(this.stickX, this.stickY, this.stickRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.stickColor;
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = this.stickBorder;
                ctx.stroke();

                ctx.restore();
            }
        }

        // Цвета с рисунка пользователя
        // Левый (Стрельба): Голубая база, зеленый стик
        leftJoy = new Joystick(true, 'rgba(173, 216, 230, 0.5)', 'rgba(144, 238, 144, 0.9)', '#008b8b', '#2e8b57');
        // Правый (Движение): Розовая база, оранжевый стик
        rightJoy = new Joystick(false, 'rgba(255, 105, 180, 0.5)', 'rgba(255, 160, 122, 0.9)', '#c71585', '#ff4500');

        class Player {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.size = 50; // Размер эмодзи
                this.speed = 300; // Пикселей в секунду
                this.maxHp = 100;
                this.hp = 100;
                this.level = 1;
                this.xp = 0;
                this.xpNeeded = 10;
                this.gemsCollected = 0;
                
                // Боевые характеристики
                this.fireRate = 400; // Ускорили стрельбу для ручного режима
                this.lastFireTime = 0;
                this.projectileSpeed = 500;
                this.damage = 25;
                this.attackRange = 400; // Радиус поиска врагов
                
                this.emoji = '🐉';
                this.direction = 1; // 1 вправо, -1 влево
            }

            update(dt) {
                // Движение (Правый джойстик или клавиатура)
                let dx = 0;
                let dy = 0;
                
                if (rightJoy.active) {
                    dx = rightJoy.dirX;
                    dy = rightJoy.dirY;
                } else {
                    if (keys.w || keys.ArrowUp) dy -= 1;
                    if (keys.s || keys.ArrowDown) dy += 1;
                    if (keys.a || keys.ArrowLeft) dx -= 1;
                    if (keys.d || keys.ArrowRight) dx += 1;
                }

                // Нормализация вектора движения (чтобы по диагонали не бегал быстрее)
                if (dx !== 0 || dy !== 0) {
                    const length = Math.hypot(dx, dy);
                    dx /= length;
                    dy /= length;
                    
                    // Поворот дракона
                    if (dx > 0) this.direction = 1;
                    if (dx < 0) this.direction = -1;
                }

                this.x += dx * this.speed * dt;
                this.y += dy * this.speed * dt;

                // Ограничение карты
                this.x = Math.max(-WORLD_SIZE, Math.min(WORLD_SIZE, this.x));
                this.y = Math.max(-WORLD_SIZE, Math.min(WORLD_SIZE, this.y));

                // Ручная стрельба
                this.handleShooting();
            }

            handleShooting() {
                const now = performance.now();
                if (now - this.lastFireTime >= this.fireRate) {
                    let shootAngle = null;

                    if (leftJoy.active) {
                        // Стрельба с левого джойстика
                        if (leftJoy.dirX !== 0 || leftJoy.dirY !== 0) {
                            shootAngle = Math.atan2(leftJoy.dirY, leftJoy.dirX);
                        }
                    } else if (mousePointer.active) {
                        // Стрельба мышью на ПК
                        const targetX = mousePointer.x - canvas.width / 2;
                        const targetY = mousePointer.y - canvas.height / 2;
                        shootAngle = Math.atan2(targetY, targetX);
                    }

                    if (shootAngle !== null) {
                        projectiles.push(new Projectile(this.x, this.y, shootAngle, this.damage, this.projectileSpeed));
                        this.lastFireTime = now;
                    }
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp <= 0) {
                    this.hp = 0;
                    endGame();
                }
                updateUI();
            }

            gainXp(amount) {
                this.xp += amount;
                this.gemsCollected++;
                
                // Лечение при подборе камня
                this.hp = Math.min(this.maxHp, this.hp + 2);

                if (this.xp >= this.xpNeeded) {
                    this.levelUp();
                }
                updateUI();
            }

            levelUp() {
                this.level++;
                this.xp -= this.xpNeeded;
                this.xpNeeded = Math.floor(this.xpNeeded * 1.5);
                
                // Улучшение характеристик
                this.maxHp += 20;
                this.hp = this.maxHp;
                this.damage += 5;
                this.fireRate = Math.max(200, this.fireRate - 50); // Ускорение стрельбы
                
                // Эффект левел-апа
                addDamageText("УРОВЕНЬ ПОВЫШЕН!", this.x, this.y - 50, "#ffd700", 30);
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(this.direction, 1); // Отражение по горизонтали
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();

                // Отрисовка радиуса атаки (опционально, для красоты, полупрозрачный)
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, this.attackRange, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255, 140, 0, 0.1)";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Enemy {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 0: Слизь, 1: Гоблин, 2: Летучая мышь
                
                if (type === 0) {
                    this.emoji = '🦠';
                    this.speed = 80;
                    this.hp = 30;
                    this.damage = 10;
                    this.size = 35;
                } else if (type === 1) {
                    this.emoji = '👺';
                    this.speed = 120;
                    this.hp = 50;
                    this.damage = 15;
                    this.size = 40;
                } else {
                    this.emoji = '🦇';
                    this.speed = 180;
                    this.hp = 20;
                    this.damage = 5;
                    this.size = 30;
                }
                
                this.maxHp = this.hp;
                // Анимация покачивания
                this.wobbleOffset = Math.random() * Math.PI * 2; 
            }

            update(dt) {
                // Движение к игроку
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed * dt;
                this.y += Math.sin(angle) * this.speed * dt;

                // Столкновение с игроком
                const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);
                if (distToPlayer < (this.size + player.size) / 2 - 10) {
                    player.takeDamage(this.damage);
                    // Отталкиваем монстра после удара, чтобы не наносил урон каждый кадр
                    this.x -= Math.cos(angle) * 50;
                    this.y -= Math.sin(angle) * 50;
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                addDamageText(`-${amount}`, this.x, this.y, "#ff3333");
                
                if (this.hp <= 0) {
                    // Смерть и дроп камня
                    gems.push(new Gem(this.x, this.y));
                    return true; // Возвращаем true, если умер
                }
                return false;
            }

            draw(ctx, cameraX, cameraY) {
                const drawX = this.x - cameraX;
                const drawY = this.y - cameraY;
                
                // Добавляем покачивание для живости
                const wobble = Math.sin(performance.now() / 150 + this.wobbleOffset) * 5;

                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, drawX, drawY + wobble);

                // Полоска ХП монстра (если ранен)
                if (this.hp < this.maxHp) {
                    const hpPercent = this.hp / this.maxHp;
                    ctx.fillStyle = "black";
                    ctx.fillRect(drawX - 20, drawY - this.size/2 - 10, 40, 6);
                    ctx.fillStyle = "red";
                    ctx.fillRect(drawX - 20, drawY - this.size/2 - 10, 40 * hpPercent, 6);
                }
            }
        }

        class Projectile {
            constructor(x, y, angle, damage, speed) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.damage = damage;
                this.emoji = '🔥';
                this.size = 25;
                this.lifeTime = 2; // секунд
                this.age = 0;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.age += dt;
                return this.age >= this.lifeTime; // Возвращает true если снаряд умер
            }

            draw(ctx, cameraX, cameraY) {
                const drawX = this.x - cameraX;
                const drawY = this.y - cameraY;
                
                ctx.save();
                ctx.translate(drawX, drawY);
                // Вращение снаряда по направлению полета
                ctx.rotate(Math.atan2(this.vy, this.vx));
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        class Gem {
            constructor(x, y) {
                this.x = x + (Math.random() * 20 - 10);
                this.y = y + (Math.random() * 20 - 10);
                this.emoji = '💎';
                this.size = 20;
                // Эффект появления
                this.spawnTime = performance.now();
                this.xpValue = 1 + Math.floor(Math.random() * 3); // Дает от 1 до 3 опыта
            }

            update(dt) {
                // Магнит к игроку, если близко
                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                if (dist < 150) {
                    // Чем ближе, тем быстрее летит
                    const speed = 400 * (1 - dist/150) + 100;
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.x += Math.cos(angle) * speed * dt;
                    this.y += Math.sin(angle) * speed * dt;
                }

                // Подбор камня
                if (dist < (this.size + player.size) / 2) {
                    player.gainXp(this.xpValue);
                    return true; // Подобран
                }
                return false;
            }

            draw(ctx, cameraX, cameraY) {
                const drawX = this.x - cameraX;
                const drawY = this.y - cameraY;
                
                // Левитация
                const floatY = Math.sin((performance.now() - this.spawnTime) / 200) * 5;

                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, drawX, drawY + floatY);
            }
        }

        // Всплывающий текст (урон, повышение уровня)
        function addDamageText(text, x, y, color = "white", size = 20) {
            damageTexts.push({
                text: text,
                x: x,
                y: y,
                color: color,
                size: size,
                lifeTime: 1.0, // секунд
                age: 0,
                vy: -50 // Летит вверх
            });
        }

        // --- ГЕНЕРАЦИЯ МИРА И СПАВН ---

        function generateScenery() {
            scenery.length = 0;
            // Оптимизация для телефонов: уменьшено количество объектов с 2000 до 800
            for (let i = 0; i < 800; i++) {
                scenery.push({
                    x: (Math.random() * 2 - 1) * WORLD_SIZE,
                    y: (Math.random() * 2 - 1) * WORLD_SIZE,
                    emoji: sceneryEmojis[Math.floor(Math.random() * sceneryEmojis.length)],
                    size: 40 + Math.random() * 40
                });
            }
        }

        let enemySpawnTimer = 0;
        let spawnInterval = 1.0; // Спавн раз в секунду

        function spawnEnemies(dt) {
            enemySpawnTimer += dt;
            
            // Уменьшаем интервал спавна со временем (усложнение)
            spawnInterval = Math.max(0.2, 1.0 - (player.level * 0.05));

            if (enemySpawnTimer >= spawnInterval) {
                enemySpawnTimer = 0;
                
                // Спавним врагов за пределами экрана
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.max(canvas.width, canvas.height) / 2 + 100;
                const spawnX = player.x + Math.cos(angle) * distance;
                const spawnY = player.y + Math.sin(angle) * distance;

                // Выбор типа врага на основе уровня
                let type = 0; // Слизь
                const rand = Math.random();
                if (player.level > 3 && rand > 0.6) type = 1; // Гоблин
                if (player.level > 5 && rand > 0.8) type = 2; // Летучая мышь

                enemies.push(new Enemy(spawnX, spawnY, type));
            }
        }

        // --- УПРАВЛЕНИЕ И UI ---

        function updateUI() {
            hpVal.innerText = Math.ceil(player.hp);
            maxhpVal.innerText = player.maxHp;
            gemsVal.innerText = player.gemsCollected;
            levelVal.innerText = player.level;
            
            const xpPercent = (player.xp / player.xpNeeded) * 100;
            xpBarFill.style.width = `${xpPercent}%`;
            xpTextVal.innerText = `Опыт: ${player.xp} / ${player.xpNeeded}`;
        }

        // Обработчики клавиатуры
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Обработчики мыши (для ПК - стрельба)
        canvas.addEventListener('mousedown', (e) => { mousePointer.active = true; mousePointer.x = e.clientX; mousePointer.y = e.clientY; });
        canvas.addEventListener('mousemove', (e) => { if(mousePointer.active) { mousePointer.x = e.clientX; mousePointer.y = e.clientY; } });
        window.addEventListener('mouseup', () => { mousePointer.active = false; });
        
        // Обработчики сенсора (Джойстики)
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.clientX < canvas.width / 2) {
                    if (!leftJoy.active) leftJoy.start(t);
                } else {
                    if (!rightJoy.active) rightJoy.start(t);
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (leftJoy.active && leftJoy.touchId === t.identifier) leftJoy.move(t);
                if (rightJoy.active && rightJoy.touchId === t.identifier) rightJoy.move(t);
            }
        }, {passive: false});

        const handleTouchEnd = (e) => { 
            e.preventDefault(); 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (leftJoy.active && leftJoy.touchId === t.identifier) leftJoy.end();
                if (rightJoy.active && rightJoy.touchId === t.identifier) rightJoy.end();
            }
        };
        window.addEventListener('touchend', handleTouchEnd, {passive: false});
        window.addEventListener('touchcancel', handleTouchEnd, {passive: false});

        // Надежная привязка кнопок для мобильных устройств
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');

        const startHandler = (e) => { e.preventDefault(); startGame(); };
        const restartHandler = (e) => { e.preventDefault(); resetGame(); };

        btnStart.addEventListener('touchstart', startHandler, {passive: false});
        btnStart.addEventListener('click', startHandler);
        
        btnRestart.addEventListener('touchstart', restartHandler, {passive: false});
        btnRestart.addEventListener('click', restartHandler);

        // --- ИГРОВОЙ ЦИКЛ ---

        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            player = new Player();
            enemies = [];
            projectiles = [];
            gems = [];
            damageTexts = [];
            
            generateScenery();
            updateUI();

            if (leftJoy && rightJoy) {
                leftJoy.updatePosition();
                rightJoy.updatePosition();
            }
            
            isPlaying = true;
            lastTime = performance.now();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            startGame();
        }

        function endGame() {
            isPlaying = false;
            finalScoreText.innerText = `Вы собрали ${player.gemsCollected} 💎 и достигли ${player.level} уровня!`;
            gameOverScreen.classList.remove('hidden');
        }

        function gameLoop(currentTime) {
            if (!isPlaying) return;

            const dt = (currentTime - lastTime) / 1000; // Дельта времени в секундах
            lastTime = currentTime;

            // Ограничиваем dt на случай подвисания вкладки
            const safeDt = Math.min(dt, 0.1);

            update(safeDt);
            draw();

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            player.update(dt);
            spawnEnemies(dt);

            // Обновление снарядов и проверка столкновений
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (p.update(dt)) {
                    projectiles.splice(i, 1); // Удаляем старые снаряды
                    continue;
                }

                // Столкновение снарядов с врагами
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dist = Math.hypot(p.x - e.x, p.y - e.y);
                    if (dist < (p.size + e.size) / 2) {
                        if (e.takeDamage(p.damage)) {
                            enemies.splice(j, 1); // Враг убит
                        }
                        projectiles.splice(i, 1); // Снаряд уничтожен при попадании
                        break; // Снаряд бьет только одного врага
                    }
                }
            }

            // Обновление врагов
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update(dt);
            }

            // Обновление камней (сбор)
            for (let i = gems.length - 1; i >= 0; i--) {
                if (gems[i].update(dt)) {
                    gems.splice(i, 1);
                }
            }

            // Обновление всплывающего текста
            for (let i = damageTexts.length - 1; i >= 0; i--) {
                const t = damageTexts[i];
                t.age += dt;
                t.y += t.vy * dt;
                if (t.age >= t.lifeTime) {
                    damageTexts.splice(i, 1);
                }
            }
        }

        function draw() {
            // Очистка экрана
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Камера следит за игроком
            const cameraX = player.x - canvas.width / 2;
            const cameraY = player.y - canvas.height / 2;

            // Отрисовка фона (простая сетка на траве)
            ctx.strokeStyle = "rgba(0,0,0,0.05)";
            ctx.lineWidth = 2;
            const gridSize = 100;
            const offsetX = -(cameraX % gridSize);
            const offsetY = -(cameraY % gridSize);
            
            ctx.beginPath();
            for (let x = offsetX; x < canvas.width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = offsetY; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();

            // Отрисовка декораций (только видимые)
            for (let s of scenery) {
                // Простая отсечка невидимых объектов (Culling)
                if (s.x > cameraX - s.size && s.x < cameraX + canvas.width + s.size &&
                    s.y > cameraY - s.size && s.y < cameraY + canvas.height + s.size) {
                    
                    ctx.font = `${s.size}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(s.emoji, s.x - cameraX, s.y - cameraY);
                }
            }

            // Отрисовка камней
            for (let g of gems) g.draw(ctx, cameraX, cameraY);

            // Отрисовка врагов
            for (let e of enemies) e.draw(ctx, cameraX, cameraY);

            // Отрисовка снарядов
            for (let p of projectiles) p.draw(ctx, cameraX, cameraY);

            // Отрисовка игрока (всегда в центре экрана)
            player.draw(ctx);

            // Отрисовка всплывающего текста
            for (let t of damageTexts) {
                const alpha = Math.max(0, 1 - (t.age / t.lifeTime));
                ctx.fillStyle = t.color;
                ctx.globalAlpha = alpha;
                ctx.font = `bold ${t.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.strokeStyle = "black";
                ctx.lineWidth = 3;
                
                const drawX = t.x - cameraX;
                const drawY = t.y - cameraY;
                
                ctx.strokeText(t.text, drawX, drawY);
                ctx.fillText(t.text, drawX, drawY);
            }
            ctx.globalAlpha = 1.0; // Сброс прозрачности

            // Отрисовка джойстиков (поверх всего)
            if (leftJoy) leftJoy.draw(ctx);
            if (rightJoy) rightJoy.draw(ctx);
        }

        // Первичная отрисовка фона перед стартом
        ctx.fillStyle = "#55a630";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
    </script>
</body>
